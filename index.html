<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Anticheat Detect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🛡 Anticheat Detect 🛡</h1>
        <p class="subtitle">Почему античит жалуется на приложение?</p>

        <textarea id="appDescription" placeholder="Anticheat Detect — это программа, которая проверяет компьютер на наличие популярных читов и запрещённых игровых модификаций.

Античит анализирует запущенные процессы, подозрительные файлы и программы, которые могут вмешиваться в работу игры. Если обнаруживается потенциально опасное ПО (например, инжекторы, макросы, оверлеи или программы для изменения памяти), система уведомляет пользователя или блокирует доступ к игре.

Программа работает в фоновом режиме и помогает поддерживать честную и безопасную игровую среду."></textarea>
        
        <button onclick="checkApp()">Проверить</button>

        <div id="result" class="result-box"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
