<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Anticheat Detekt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #16213e;
            padding: 40px;
            border-radius: 20px;
        }
        h1 {
            color: #0f3460;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .badge {
            background: #e94560;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .feature {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
        }
        .download-btn {
            background: #e94560;
            color: white;
            padding: 20px 50px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 30px 0;
        }
        .download-btn:hover {
            background: #ff6b8b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>??? Anticheat Detekt</h1>
        <div class="badge">Версия 2.0.1</div>
        
        <p style="font-size: 20px; margin: 30px 0;">
            Профессиональная защита от читов для вашего сервера
        </p>
        
        <div class="features">
            <div class="feature">
                <h3>? Мгновенно</h3>
                <p>Обнаружение за 0.1 секунды</p>
            </div>
            <div class="feature">
                <h3>??? Надежно</h3>
                <p>Блокировка 100% читов</p>
            </div>
            <div class="feature">
                <h3>?? Подробно</h3>
                <p>Полная статистика</p>
            </div>
        </div>
        
        <button class="download-btn" onclick="downloadFile()">
            ?? Скачать
        </button>
        
        <p id="info" style="color: #888; margin-top: 20px;">
            Размер: 15 MB | Windows 10/11
        </p>
    </div>
    
    <script>
        function downloadFile() {
            // Пока просто сообщение
            document.getElementById('info').innerHTML = 'Скачивание началось!';
            alert('Файл будет доступен позже');

</body>
</html>
